name: Merge uploaded parts

on:
  workflow_dispatch:
    inputs:
      manifest_path:
        description: "Path to manifest.json"
        required: true
        type: string

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show manifest
        run: |
          echo "manifest_path=${{ inputs.manifest_path }}"

      - name: Merge parts
        run: |
          python3 .github/scripts/merge_parts.py "${{ inputs.manifest_path }}"

      - name: Commit merged files
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "merge uploaded parts [skip ci]"
          git push
